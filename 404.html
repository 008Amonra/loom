<script>
(function(){
  var path = location.pathname;

  if (path.startsWith('/tools') || path.startsWith('/pdf-merge') || path.startsWith('/pdf-compress') || path.startsWith('/image-compress') || path.startsWith('/text-diff') || path.startsWith('/qr-code') || path.startsWith('/json-formatter') || path.startsWith('/color-palette') || path.startsWith('/video-to-gif') || path.startsWith('/scrape')) {
    if (path.startsWith('/tools')) {
      location.replace('https://tools.45dgof8.com' + path);
    } else {
      location.replace('https://tools.45dgof8.com/tools' + path);
    }
  } else {
    document.getElementById('msg').textContent = 'Page not found.';

})();
