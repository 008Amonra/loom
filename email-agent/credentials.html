<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Agent – Credentials</title>
<style>
* { box-sizing: border-box; margin: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #e0e0e0; display: grid; place-items: center; min-height: 100vh; padding: 1rem; }
.card { background: #1a1a2e; border-radius: 1rem; padding: 2rem; width: 100%; max-width: 560px; box-shadow: 0 0 40px rgba(0,100,255,.15); }
h1 { font-size: 1.25rem; margin-bottom: .25rem; }
.sub { color: #888; font-size: .85rem; margin-bottom: 1.5rem; }
label { display: block; font-size: .8rem; color: #aaa; margin-top: 1rem; margin-bottom: .25rem; }
input { width: 100%; padding: .6rem .75rem; border-radius: .5rem; border: 1px solid #333; background: #0d0d1a; color: #e0e0e0; font-size: .9rem; }
input:focus { outline: none; border-color: #4488ff; }
.account { border: 1px solid #222; border-radius: .75rem; padding: 1rem; margin-top: 1rem; }
.account h3 { font-size: .9rem; color: #88bbff; margin-bottom: .5rem; }
.btn-row { display: flex; gap: .5rem; margin-top: 1.5rem; }
button { flex: 1; padding: .65rem; border-radius: .5rem; border: none; font-weight: 600; cursor: pointer; }
.btn-enc { background: #3366ff; color: #fff; }
.btn-dec { background: #2a2a3e; color: #ccc; border: 1px solid #444; }
.btn-copy { background: #2a5a2a; color: #8c8; border: 1px solid #383; }
.btn-export { background: #5a3a1a; color: #da8; border: 1px solid #864; }
.status { margin-top: 1rem; padding: .5rem .75rem; border-radius: .5rem; font-size: .85rem; display: none; }
.status.ok { display: block; background: #1a3a1a; color: #6c6; }
.status.err { display: block; background: #3a1a1a; color: #c66; }
.info { font-size: .75rem; color: #666; margin-top: 1.5rem; text-align: center; }
textarea { width: 100%; margin-top: .75rem; padding: .5rem; border-radius: .5rem; border: 1px solid #333; background: #0d0d1a; color: #e0e0e0; font-size: .75rem; font-family: monospace; resize: vertical; display: none; height: 80px; }
</style>
</head>
<body>
<div class="card">
  <h1>📧 Email Agent</h1>
  <p class="sub">Credentials werden mit AES-GCM clientseitig verschlüsselt – ich sehe nur Sternchen</p>

  <div id="accounts"></div>

  <label>Passphrase (für Verschlüsselung)</label>
  <input type="password" id="passphrase" placeholder="Wähle einen sicheren Passphrase" autocomplete="new-password">
  <label>Passphrase wiederholen</label>
  <input type="password" id="passphrase-confirm" placeholder="Passphrase wiederholen" autocomplete="new-password">

  <div class="btn-row">
    <button class="btn-enc" onclick="encrypt()">🔐 Verschlüsseln & Speichern</button>
    <button class="btn-dec" onclick="decrypt()">🔓 Entschlüsseln (Test)</button>
  </div>
  <div class="btn-row">
    <button class="btn-export" onclick="exportEnc()">📥 Export encrypted config</button>
    <button class="btn-copy" onclick="copyConfig()">📋 Copy to clipboard</button>
  </div>

  <div id="status" class="status"></div>
  <textarea id="output" readonly placeholder="Encrypted output appears here..."></textarea>
  <div class="info">🔒 Alle Daten verlassen deinen Browser nur verschlüsselt. Der Passphrase wird nie gespeichert.<br>📌 Später im Terminal: <code>~/email-agent/mail.sh</code> startet opencode mit unsichtbarer Passphrase-Eingabe.</div>
</div>

<script>
const ACCOUNTS = ['Gmail 1', 'Gmail 2 (Bot)', 'Gmail 3'];
const KEY = 'email-agent-credentials';

function load() {
  const saved = localStorage.getItem(KEY);
  const data = saved ? JSON.parse(saved) : {};
  return data;
}

function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function render() {
  const data = load();
  const container = document.getElementById('accounts');
  container.innerHTML = ACCOUNTS.map((name, i) => {
    const a = data[name] || {};
    return `
      <div class="account">
        <h3>${name}</h3>
        <label>Email</label>
        <input type="email" id="email-${i}" value="${a.email || ''}" placeholder="user@gmail.com">
        <label>App-Passwort</label>
        <input type="password" id="pass-${i}" value="${a.appPassword || ''}" placeholder="xxxx xxxx xxxx xxxx">
        <label>SMTP-Server (optional)</label>
        <input type="text" id="smtp-${i}" value="${a.smtp || 'smtp.gmail.com'}" placeholder="smtp.gmail.com">
        <label>IMAP-Server (optional)</label>
        <input type="text" id="imap-${i}" value="${a.imap || 'imap.gmail.com'}" placeholder="imap.gmail.com">
      </div>
    `;
  }).join('');
}

function collect() {
  const data = {};
  ACCOUNTS.forEach((name, i) => {
    data[name] = {
      email: document.getElementById(`email-${i}`).value.trim(),
      appPassword: document.getElementById(`pass-${i}`).value.trim(),
      smtp: document.getElementById(`smtp-${i}`).value.trim() || 'smtp.gmail.com',
      imap: document.getElementById(`imap-${i}`).value.trim() || 'imap.gmail.com',
    };
  });
  return data;
}

async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function encrypt() {
  const data = collect();
  const passphrase = document.getElementById('passphrase').value;
  const confirm = document.getElementById('passphrase-confirm').value;
  if (!passphrase) { setStatus('Passphrase eingeben!', 'err'); return; }
  if (passphrase !== confirm) { setStatus('Passphrasen stimmen nicht überein!', 'err'); return; }

  const json = JSON.stringify(data);
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(32));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passphrase, salt);
  const ciphertext = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, enc.encode(json)
  );

  const blob = {
    salt: btoa(String.fromCharCode(...salt)),
    iv: btoa(String.fromCharCode(...iv)),
    data: btoa(String.fromCharCode(...new Uint8Array(ciphertext))),
  };

  const blobJson = JSON.stringify(blob);
  document.getElementById('output').value = blobJson;
  document.getElementById('output').style.display = 'block';
  save(data);
  setStatus('✅ Verschlüsselt! Config liegt jetzt auch lokal im Browser.', 'ok');
}

async function decrypt() {
  const encrypted = document.getElementById('output').value.trim();
  if (!encrypted) { setStatus('Keine verschlüsselte Config geladen. Erst "Export" klicken oder einfügen.', 'err'); return; }
  const passphrase = document.getElementById('passphrase').value;
  if (!passphrase) { setStatus('Passphrase eingeben!', 'err'); return; }

  try {
    const blob = JSON.parse(encrypted);
    const salt = Uint8Array.from(atob(blob.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(blob.iv), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(blob.data), c => c.charCodeAt(0));
    const key = await deriveKey(passphrase, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    const json = new TextDecoder().decode(decrypted);
    const parsed = JSON.parse(json);
    setStatus('✅ Entschlüsselt! ' + Object.keys(parsed).length + ' Accounts gefunden.', 'ok');
    console.log('Decrypted data:', parsed);
    // Restore plaintext into fields temporarily
    ACCOUNTS.forEach((name, i) => {
      if (parsed[name]) {
        document.getElementById(`email-${i}`).value = parsed[name].email || '';
        document.getElementById(`pass-${i}`).value = parsed[name].appPassword || '';
        document.getElementById(`smtp-${i}`).value = parsed[name].smtp || 'smtp.gmail.com';
        document.getElementById(`imap-${i}`).value = parsed[name].imap || 'imap.gmail.com';
      }
    });
  } catch(e) {
    setStatus('❌ Entschlüsselung fehlgeschlagen. Falscher Passphrase?', 'err');
  }
}

function exportEnc() {
  const output = document.getElementById('output');
  if (!output.value) { setStatus('Erst verschlüsseln!', 'err'); return; }
  const blob = new Blob([output.value], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'email-credentials.enc.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('📥 Config heruntergeladen als email-credentials.enc.json', 'ok');
}

async function copyConfig() {
  const output = document.getElementById('output');
  if (!output.value) { setStatus('Erst verschlüsseln!', 'err'); return; }
  await navigator.clipboard.writeText(output.value);
  setStatus('📋 In Zwischenablage kopiert. Jetzt im Terminal einfügen.', 'ok');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

render();
</script>
</body>
</html>
