<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — 45dgof8</title>
<meta name="description" content="Articles about AI tools, YouTube Shorts creation, and building in public.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#0a0a0f;color:#d0d0d8;line-height:1.6;overflow-x:hidden}
a{color:#d4af37;text-decoration:none;transition:color .15s}
a:hover{color:#f5d742}

/* nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a22;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:3px;color:#d4af37}
nav .logo span{color:#555}
nav a{color:#888;font-size:.85rem;margin-left:20px}
nav a:hover{color:#d4af37}

/* header */
.header{padding:120px 24px 60px;text-align:center}
.header h1{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3rem);color:#d4af37;margin-bottom:12px}
.header p{color:#888;font-size:1.1rem;max-width:500px;margin:0 auto}

/* posts */
.posts{max-width:740px;margin:0 auto;padding:0 24px 80px}
.post-card{padding:32px 0;border-bottom:1px solid #1a1a22}
.post-card:last-child{border-bottom:none}
.post-card time{font-size:.8rem;color:#666;letter-spacing:1px;text-transform:uppercase}
.post-card h2{font-family:'Cinzel',serif;font-size:1.4rem;margin:8px 0 12px}
.post-card h2 a{color:#e0e0e8}
.post-card h2 a:hover{color:#d4af37}
.post-card p{color:#999;font-size:.95rem;margin-bottom:12px}
.post-card .tag{display:inline-block;padding:3px 10px;border:1px solid #1a1a22;border-radius:20px;font-size:.7rem;color:#666;margin-right:6px}

/* empty */
.empty{text-align:center;padding:80px 24px;color:#555}
.empty h2{font-family:'Cinzel',serif;color:#d4af37;margin-bottom:12px}

/* footer */
footer{text-align:center;padding:40px 24px;color:#444;font-size:.8rem;border-top:1px solid #1a1a22}
footer a{color:#666}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">45<span>D</span>go<span>F</span>8</a>
  <div>
    <a href="/blog/">Blog</a>
    <a href="/apps.html">Apps</a>
    <a href="/">Home</a>
  </div>
</nav>

<div class="header">
  <h1>Blog</h1>
  <p>AI tools, YouTube creation, and building in public.</p>
</div>

<div class="posts">
{{POSTS}}
</div>

<footer>
  <p>© 2026 45dgof8 · <a href="/">Home</a> · <a href="/blog/">Blog</a> · <a href="/apps.html">Apps</a></p>
</footer>

{{ANALYTICS}}
</body>
</html>
