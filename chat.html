<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>45dgof8 Chat</title>
<meta name="description" content="Chat with Big Pickle">
<meta name="theme-color" content="#0d0d14">
<link rel="manifest" href="/manifest-chat.json">
<link rel="icon" href="loom-figure.webp" type="image/webp">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="45 Chat">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;background:#0d0d14;color:#e0e0e8;display:flex;flex-direction:column}
#header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#0d0d14;border-bottom:1px solid #222;flex-shrink:0}
#header img{width:36px;height:36px;border-radius:8px}
#header h1{font-size:1.05rem;font-weight:600;color:#e0e0e8}
#header .status{font-size:0.7rem;color:#44cc66;margin-left:auto}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:0.95rem;line-height:1.5;word-wrap:break-word;animation:fadeIn .2s}
.msg.user{align-self:flex-end;background:#1a4a6a;color:#e0f0ff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#1a1a2e;color:#c8c8e0;border-bottom-left-radius:4px;border:1px solid #2a2a4a}
.msg.system{align-self:center;background:none;color:#666;font-size:0.8rem;text-align:center;padding:4px 8px}
#typing{align-self:flex-start;background:#1a1a2e;color:#888;padding:10px 14px;border-radius:14px;font-size:0.9rem;display:none;border:1px solid #2a2a4a;border-bottom-left-radius:4px}
#typing span{animation:dots 1.4s infinite;display:inline-block}
#typing span:nth-child(2){animation-delay:.2s}
#typing span:nth-child(3){animation-delay:.4s}
@keyframes dots{0%,60%,100%{opacity:0.3}30%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#input-wrap{display:flex;gap:8px;padding:12px 16px;background:#0d0d14;border-top:1px solid #222;flex-shrink:0}
#input-wrap textarea{flex:1;padding:10px 14px;border-radius:10px;border:1px solid #333;background:#14141e;color:#e0e0e8;font-size:0.95rem;font-family:inherit;resize:none;outline:none;max-height:120px;line-height:1.4}
#input-wrap textarea:focus{border-color:#4488ff}
#send-btn{width:44px;height:44px;border-radius:10px;border:none;background:#4488ff;color:#fff;font-size:1.2rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
#send-btn:hover{background:#5599ff}
#send-btn:disabled{background:#333;cursor:not-allowed}
#clear-btn{background:none;border:none;color:#555;font-size:0.8rem;cursor:pointer;padding:4px 8px;border-radius:4px}
#clear-btn:hover{color:#888;background:#1a1a1a}
@media(max-width:480px){.msg{max-width:90%;font-size:0.9rem}#input-wrap{padding:8px 12px}}
</style>
</head>
<body>

<div id="header">
  <img src="loom-figure.webp" alt="logo">
  <h1>Big Pickle</h1>
  <span class="status">● live</span>
</div>

<div id="chat">
  <div class="msg system">Connected via 45dgof8</div>
</div>

<div id="typing"><span>●</span><span>●</span><span>●</span></div>

<div id="input-wrap">
  <textarea id="input" rows="1" placeholder="Message..." enterkeyhint="send"></textarea>
  <button id="send-btn">↑</button>
  <button id="clear-btn">⌂</button>
</div>

<script>
const WEBHOOK_URL = 'https://agent-n8n.45dgof8.com/webhook/chat';

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const typing = document.getElementById('typing');
const clearBtn = document.getElementById('clear-btn');

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function setTyping(on) {
  typing.style.display = on ? 'flex' : 'none';
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg(text, 'user');
  setTyping(true);
  sendBtn.disabled = true;
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const reply = data.reply || data.response || data.output || data.text || data.message || JSON.stringify(data);
    addMsg(reply, 'bot');
  } catch(e) {
    addMsg('Offline or error — try again later', 'system');
  }
  setTyping(false);
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

clearBtn.addEventListener('click', () => {
  chat.innerHTML = '<div class="msg system">Chat cleared</div>';
  input.value = '';
  input.style.height = 'auto';
});

let firstMsg = true;
input.addEventListener('focus', () => {
  if (firstMsg) {
    addMsg('Send a message and it goes through the local agent.', 'system');
    firstMsg = false;
  }
});
</script>
</body>
</html>
